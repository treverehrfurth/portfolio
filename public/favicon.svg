<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .mark-dark  { display: block; }
      .mark-light { display: none; }
      @media (prefers-color-scheme: light) {
        .mark-dark  { display: none; }
        .mark-light { display: block; }
      }
    </style>
  </defs>
  <image class="mark-dark"  href="/logo-white.png" width="512" height="512"/>
  <image class="mark-light" href="/logo-black-transparant-bg.png" width="512" height="512"/>
</svg>
