<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mark-dark  { display: block; }
      .mark-light { display: none; }
      @media (prefers-color-scheme: light) {
        .mark-dark  { display: none; }
        .mark-light { display: block; }
      }
    </style>
    <symbol id="brand" viewBox="0 0 512 512">
      <image class="mark-dark"  href="/logo-white.png" width="512" height="512"/>
      <image class="mark-light" href="/logo-black.png" width="512" height="512"/>
    </symbol>
  </defs>
</svg>
